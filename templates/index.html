<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Scrap Letter Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-upload {
            border: 2px dashed #667eea;
            padding: 30px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }
        .file-upload:hover {
            background: #f5f5f5;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 5px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Vehicle Scrap Letter Generator</h1>
        
        <form id="ocrForm">
            <div class="form-group">
                <label>Upload Vehicle Document</label>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" required>
            </div>
            
            <button type="submit">📄 Scan Document</button>
        </form>

        <div id="result" class="result">
            <h3>Extracted Details:</h3>
            <p><strong>Owner:</strong> <span id="owner"></span></p>
            <p><strong>Vehicle:</strong> <span id="vehicle"></span></p>
            <p><strong>Engine:</strong> <span id="engine"></span></p>
            <p><strong>Chassis:</strong> <span id="chassis"></span></p>
            <p><strong>Model:</strong> <span id="model"></span></p>
            
            <button id="generateBtn" style="margin-top: 20px;">📝 Generate Letter</button>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script>
        let extractedData = {};

        document.getElementById('ocrForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showError('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/scan', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    extractedData = data.details;
                    document.getElementById('owner').textContent = data.details.owner;
                    document.getElementById('vehicle').textContent = data.details.vehicle;
                    document.getElementById('engine').textContent = data.details.engine;
                    document.getElementById('chassis').textContent = data.details.chassis;
                    document.getElementById('model').textContent = data.details.model;
                    document.getElementById('result').classList.add('show');
                    document.getElementById('generateBtn').style.display = 'block';
                    hideError();
                } else {
                    showError(data.error || 'Scan failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('/generate_letter', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ...extractedData,
                        date: new Date().toISOString().split('T')[0],
                        city: 'Mumbai',
                        sipl: 'ABC Pvt Ltd',
                        handed_by: 'John Doe',
                        pickup_address: '123 Main St'
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Scrap_Letter.docx';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    hideError();
                } else {
                    const data = await response.json();
                    showError(data.error || 'Generation failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
